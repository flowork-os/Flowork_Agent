<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowAlpha</title>
<style>
  :root{--mx:#22ff88;--cy:#36e6ff;--bg:#06121a;--card:#02120c;--line:rgba(34,255,136,.18);--dim:#7fb9a6}
  html,body{margin:0;height:100%;background:var(--bg);color:#bdf5d6;
    font-family:ui-monospace,'JetBrains Mono',Consolas,monospace}
  .wrap{padding:16px;display:flex;flex-direction:column;gap:12px;width:100%;box-sizing:border-box}
  .h{color:var(--mx);letter-spacing:3px;font-size:15px;text-shadow:0 0 10px rgba(34,255,136,.4)}
  .sub{color:var(--dim);font-size:11px;margin-top:-6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  label{font-size:11px;color:var(--dim)}
  input,select{background:#02120c;color:#dffaf0;border:1px solid rgba(34,255,136,.3);border-radius:6px;
    padding:8px;font:inherit;font-size:13px;outline:none;width:90px}
  input.sym{width:130px} select{width:auto}
  input:focus,select:focus{border-color:var(--mx);box-shadow:0 0 0 1px var(--mx)}
  button{background:linear-gradient(90deg,var(--mx),var(--cy));color:#001a14;border:0;border-radius:5px;
    padding:8px 16px;font:inherit;font-weight:700;letter-spacing:1px;cursor:pointer}
  button.ghost{background:#02120c;color:var(--mx);border:1px solid var(--line)}
  .price{font-size:26px;color:var(--cy);text-shadow:0 0 14px rgba(54,230,255,.4)}
  .price small{font-size:12px;color:var(--dim)}
  canvas{width:100%;height:300px;display:block;border-radius:6px;background:#01100a;margin-top:8px}
  canvas.eq{height:200px}
  .st{color:var(--mx);font-size:11px;min-height:14px}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
  .m{background:#01100a;border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .m .k{font-size:10px;color:var(--dim);letter-spacing:1px}
  .m .v{font-size:18px;margin-top:3px}
  .pos{color:var(--mx)} .neg{color:#ff6b6b}
  .leg{font-size:10px;color:var(--dim);margin-top:6px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;margin:0 3px 0 8px}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-size:10px;letter-spacing:1px}
  tr.best td{color:var(--mx)}
</style>
</head>
<body>
<div class="wrap">
  <div class="h">▲ FLOWALPHA</div>
  <div class="sub">Sovereign quant desk — the same engine driven by you (here) AND agents (tools). Try: "optimize an sma_cross backtest on ETHUSDT".</div>

  <div class="card">
    <div class="row">
      <label>SYMBOL</label><input id="sym" class="sym" value="BTCUSDT" autocomplete="off">
      <label>INTERVAL</label><input id="iv" value="1h" autocomplete="off">
      <button id="load">LOAD CHART</button>
      <span class="price" id="price">—</span>
    </div>
    <canvas id="chart" width="1400" height="300"></canvas>
    <div class="leg"><span class="dot" style="background:var(--cy)"></span>price
      <span class="dot" style="background:var(--mx)"></span>SMA fast
      <span class="dot" style="background:#ffd166"></span>SMA slow</div>
    <div class="st" id="cst"></div>
  </div>

  <div class="card">
    <div class="row">
      <label>STRATEGY</label><select id="strat"></select>
      <label>FAST</label><input id="fast" type="number" value="10">
      <label>SLOW</label><input id="slow" type="number" value="30">
      <label>FEE bps</label><input id="fee" type="number" value="10">
      <button id="run">RUN BACKTEST</button>
      <button id="opt" class="ghost">OPTIMIZE</button>
    </div>
    <div class="metrics" id="metrics"></div>
    <canvas id="eq" class="eq" width="1400" height="200"></canvas>
    <div class="leg"><span class="dot" style="background:var(--cy)"></span>strategy equity (start = 1.0)</div>
    <div class="st" id="bst"></div>
    <div id="opttbl"></div>
  </div>

  <div class="card">
    <div class="row">
      <label>AI ANALYSIS</label>
      <button id="ai" class="ghost">ANALYZE (via Flowork router)</button>
      <span class="st" id="aist"></span>
    </div>
    <div id="aiout" style="margin-top:8px;font-size:13px;line-height:1.6;color:#dffaf0;white-space:pre-wrap"></div>
  </div>

  <div class="card">
    <div class="row">
      <label>PAPER PORTFOLIO</label>
      <input id="pbsym" class="sym" placeholder="symbol" autocomplete="off">
      <input id="pbamt" type="number" placeholder="USDT" value="1000">
      <button id="pbuy">BUY</button>
      <button id="psell" class="ghost">SELL ALL</button>
      <button id="preset" class="ghost">RESET</button>
      <span class="st" id="pst"></span>
    </div>
    <div class="sub">Virtual cash — no real money, no broker. Real trading is a separate owner-gated phase.</div>
    <div class="metrics" id="pmetrics"></div>
    <div id="ptbl"></div>
  </div>
</div>
<script>
  // Bridge to the Flowork host (sandboxed iframe; postMessage {op,args} is the only channel).
  let rq = 0; const pending = {};
  function call(op, args) {
    return new Promise((res) => { const id = ++rq; pending[id] = res;
      parent.postMessage({ fw: 1, kind: 'op', reqId: id, op, args: args || {} }, '*'); });
  }
  window.addEventListener('message', (e) => {
    const d = e.data || {}; if (d.fw !== 1) return;
    if (d.kind === 'res' && pending[d.reqId]) { pending[d.reqId](d); delete pending[d.reqId]; }
    if (d.kind === 'state') { loadBacktest(); loadPortfolio(); } // agent acted → host notifies → refresh
  });
  const $ = (id) => document.getElementById(id);
  const sym = () => $('sym').value.trim().toUpperCase();
  const iv = () => $('iv').value.trim() || '1h';

  // ── generic line plot ────────────────────────────────────────────────────
  function plot(canvas, series, opts) {
    const ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height, pad = 8;
    ctx.clearRect(0, 0, W, H);
    let lo = Infinity, hi = -Infinity;
    series.forEach(s => s.data.forEach(v => { if (v != null) { lo = Math.min(lo, v); hi = Math.max(hi, v); } }));
    if (!isFinite(lo) || hi === lo) return;
    const n = Math.max(...series.map(s => s.data.length));
    const x = (i) => pad + (i / (n - 1)) * (W - 2 * pad);
    const y = (v) => H - pad - ((v - lo) / (hi - lo)) * (H - 2 * pad);
    if (opts && opts.base != null) {
      ctx.strokeStyle = 'rgba(127,185,166,.3)'; ctx.setLineDash([4, 4]); ctx.beginPath();
      ctx.moveTo(pad, y(opts.base)); ctx.lineTo(W - pad, y(opts.base)); ctx.stroke(); ctx.setLineDash([]);
    }
    series.forEach(s => {
      ctx.strokeStyle = s.color; ctx.lineWidth = s.w || 1.4; ctx.beginPath(); let started = false;
      s.data.forEach((v, i) => { if (v == null) { started = false; return; }
        const px = x(i), py = y(v); if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py); });
      ctx.stroke();
    });
  }

  // ── chart ──────────────────────────────────────────────────────────────────
  async function loadChart() {
    const st = $('cst'); st.textContent = '…';
    const fast = +$('fast').value || 10, slow = +$('slow').value || 30;
    const [k, p, sf, ss] = await Promise.all([
      call('get_klines', { symbol: sym(), interval: iv(), limit: 200 }),
      call('get_price', { symbol: sym() }),
      call('compute_indicator', { symbol: sym(), interval: iv(), limit: 200, indicator: 'sma', period: fast }),
      call('compute_indicator', { symbol: sym(), interval: iv(), limit: 200, indicator: 'sma', period: slow }),
    ]);
    if (!k.ok || !k.result) { st.textContent = '✕ ' + (k.error || 'load failed'); return; }
    plot($('chart'), [
      { data: k.result.candles.map(c => c.c), color: '#36e6ff', w: 1.6 },
      { data: (sf.result ? sf.result.series.map(s => s.v) : []), color: '#22ff88' },
      { data: (ss.result ? ss.result.series.map(s => s.v) : []), color: '#ffd166' },
    ], {});
    if (p.ok && p.result) $('price').innerHTML = p.result.price.toLocaleString('en-US', { maximumFractionDigits: 8 }) + ' <small>' + p.result.symbol + '</small>';
    st.textContent = '✓ ' + k.result.candles.length + ' candles · ' + new Date().toLocaleTimeString();
  }

  // ── backtest + optimize ────────────────────────────────────────────────────
  function card(k, v, c) { return '<div class="m"><div class="k">' + k + '</div><div class="v ' + (c || '') + '">' + v + '</div></div>'; }
  function renderBacktest(r) {
    if (!r || !r.metrics) { $('metrics').innerHTML = '<div class="m"><div class="k">NO RUN YET</div></div>'; return; }
    const m = r.metrics, cls = (v) => v >= 0 ? 'pos' : 'neg', pct = (v) => (v >= 0 ? '+' : '') + v + '%';
    $('metrics').innerHTML =
      card('RETURN', pct(m.total_return_pct), cls(m.total_return_pct)) +
      card('BUY & HOLD', pct(m.buy_hold_pct), cls(m.buy_hold_pct)) +
      card('WIN RATE', m.win_rate_pct + '%') +
      card('MAX DD', pct(m.max_drawdown_pct), 'neg') +
      card('SHARPE', m.sharpe, cls(m.sharpe)) +
      card('TRADES', m.trades);
    plot($('eq'), [{ data: r.equity.map(p => p.eq), color: '#36e6ff', w: 1.6 }], { base: 1.0 });
  }
  async function runBacktest() {
    const st = $('bst'); st.textContent = 'running…';
    const r = await call('run_backtest', { symbol: sym(), interval: iv(), strategy: $('strat').value,
      fast: +$('fast').value || 10, slow: +$('slow').value || 30, fee_bps: +$('fee').value || 10 });
    $('opttbl').innerHTML = '';
    if (r.ok && r.result) { renderBacktest(r.result); st.textContent = '✓ ' + r.result.strategy + ' · ' + new Date().toLocaleTimeString(); }
    else st.textContent = '✕ ' + (r.error || 'backtest failed');
  }
  async function optimize() {
    const st = $('bst'); st.textContent = 'optimizing…';
    const r = await call('run_optimize', { symbol: sym(), interval: iv(), strategy: $('strat').value,
      rank_by: 'total_return_pct', fee_bps: +$('fee').value || 10 });
    if (!r.ok || !r.result) { st.textContent = '✕ ' + (r.error || 'optimize failed'); return; }
    const res = r.result, b = res.best;
    // apply best params back into the inputs + re-run the full backtest for the chart
    if (b.params.fast) $('fast').value = b.params.fast;
    if (b.params.slow) $('slow').value = b.params.slow;
    await runBacktest();
    let rows = res.results.map((x, i) =>
      '<tr class="' + (i === 0 ? 'best' : '') + '"><td>' + JSON.stringify(x.params) + '</td><td>' +
      x.metrics.total_return_pct + '%</td><td>' + x.metrics.sharpe + '</td><td>' + x.metrics.win_rate_pct +
      '%</td><td>' + x.metrics.trades + '</td></tr>').join('');
    $('opttbl').innerHTML = '<table><tr><th>PARAMS</th><th>RETURN</th><th>SHARPE</th><th>WIN</th><th>TRADES</th></tr>' + rows + '</table>';
    st.textContent = '✓ optimized ' + res.strategy + ' · tested ' + res.tested + ' · best ' + b.metrics.total_return_pct + '% (buy&hold ' + res.buy_hold_pct + '%)';
  }
  async function loadBacktest() { const r = await call('get_last_backtest'); if (r.ok && r.result && r.result.metrics) renderBacktest(r.result); }

  async function initStrategies() {
    const r = await call('list_strategies');
    const sel = $('strat');
    if (r.ok && r.result) r.result.strategies.forEach(s => {
      const o = document.createElement('option'); o.value = s.name; o.textContent = s.name; sel.appendChild(o);
    });
  }

  async function aiAnalyze() {
    const st = $('aist'); st.textContent = 'thinking…'; $('aiout').textContent = '';
    const r = await call('ai_analyze', { symbol: sym(), interval: iv() });
    if (r.ok && r.result) { $('aiout').textContent = r.result.analysis; st.textContent = '✓ ' + new Date().toLocaleTimeString(); }
    else { st.textContent = '✕ ' + (r.error || 'failed'); }
  }
  // ── paper portfolio ─────────────────────────────────────────────────────────
  async function loadPortfolio() {
    const r = await call('portfolio_get');
    if (!r.ok || !r.result) return;
    const p = r.result, cls = (v) => v >= 0 ? 'pos' : 'neg', pct = (v) => (v >= 0 ? '+' : '') + v + '%';
    $('pmetrics').innerHTML =
      card('EQUITY', '$' + p.equity) + card('CASH', '$' + p.cash) +
      card('RETURN', pct(p.total_return_pct), cls(p.total_return_pct)) +
      card('REALIZED', '$' + p.realized_pnl, cls(p.realized_pnl)) +
      card('POSITIONS', p.positions.length);
    if (!p.positions.length) { $('ptbl').innerHTML = ''; return; }
    let rows = p.positions.map(x => '<tr><td>' + x.symbol + '</td><td>' + x.qty + '</td><td>' + x.avg.toFixed(2) +
      '</td><td>' + x.price.toFixed(2) + '</td><td>$' + x.value + '</td><td class="' + cls(x.unrealized) + '">' +
      pct(x.unrealized_pct) + '</td></tr>').join('');
    $('ptbl').innerHTML = '<table><tr><th>SYMBOL</th><th>QTY</th><th>AVG</th><th>PRICE</th><th>VALUE</th><th>P&L</th></tr>' + rows + '</table>';
  }
  async function doBuy() {
    const st = $('pst'); st.textContent = '…';
    const r = await call('paper_buy', { symbol: ($('pbsym').value.trim() || sym()).toUpperCase(), quote_amount: +$('pbamt').value || 0 });
    st.textContent = r.ok ? '✓ bought' : ('✕ ' + (r.error || '')); loadPortfolio();
  }
  async function doSell() {
    const st = $('pst'); st.textContent = '…';
    const r = await call('paper_sell', { symbol: ($('pbsym').value.trim() || sym()).toUpperCase() });
    st.textContent = r.ok ? ('✓ sold · realized $' + r.result.realized) : ('✕ ' + (r.error || '')); loadPortfolio();
  }
  async function doReset() { await call('paper_reset'); $('pst').textContent = '✓ reset'; loadPortfolio(); }

  $('load').onclick = loadChart;
  $('run').onclick = runBacktest;
  $('opt').onclick = optimize;
  $('ai').onclick = aiAnalyze;
  $('pbuy').onclick = doBuy;
  $('psell').onclick = doSell;
  $('preset').onclick = doReset;
  (async () => { await initStrategies(); loadChart(); loadBacktest(); loadPortfolio(); })();
</script>
</body>
</html>
