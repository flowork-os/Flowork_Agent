<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flowork — Rumah AI Ayah</title>
  <link rel="stylesheet" href="/css/style.css?v=5">
  <script type="module" src="/js/app.js?v=5"></script>
  <!-- Mermaid: try lokal /vendor/ (sovereignty doctrine). Kalau missing,
       silent fail — splitlist.js graceful: `if (window.mermaid)`. -->
  <script src="/vendor/mermaid.min.js" onerror="console.warn('mermaid lokal missing, diagram render skipped')"></script>
</head>

<body>
  <header>
    <button id="navToggle"
      data-tooltip="☰ Toggle Sidebar|Sembunyikan atau tampilkan panel navigasi kiri. Berguna untuk layar kecil atau fokus konten.||Ctrl+B">☰</button>
    <h1>⚡ Flowork</h1>
    <span id="sb" class="ba"
      data-tooltip="Status Sistem|● AKTIF = daemon berjalan normal. ● STANDBY = daemon sleep/off. Klik tab Setting → Aksi Runtime untuk kontrol.">●
      AKTIF</span>
    <span id="ts"></span>
    <button id="themeToggle"
      data-tooltip="🌓 Toggle Theme|Ganti antara mode gelap (default) dan mode terang. Preferensi disimpan otomatis di browser.||klik"
      style="background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;margin-left:12px;">🌓</button>
  </header>

  <div id="layout">
    <nav id="nav">
      <!-- Tab navigasi utama FloworkOS -->
      <button data-tab="komunikasi" class="active"
        data-tooltip="💬 Komunikasi|Hub pesan utama — Chat Warga, Keluh Kesah, Semua Pesan, Timeline, dan Forum Sabtu. Semua saluran komunikasi FloworkOS dalam satu tempat.||Alt+1">💬
        Komunikasi</button>
      <button data-tab="keuangan"
        data-tooltip="💰 Keuangan|Dashboard finansial — Overview budget, LLM spending, earner activity per platform, saldo wallet, dan crypto earner.||Alt+2">💰
        Keuangan</button>
      <button data-tab="evolusi"
        data-tooltip="🌱 Evolusi|Silsilah kode Flowork — pohon generasi rc-tag, list commit linear, dan changelog highlight. Lacak progres evolusi sistem.||Alt+3">🌱
        Evolusi</button>
      <button data-tab="imun"
        data-tooltip="🛡️ Sistem Imun|Pertahanan sistem — Bug Tracker kolektif, Arsenal audit (SGVP), fixture testing, dan Protector file/folder.||Alt+4">🛡️
        Sistem Imun</button>
      <button data-tab="tasking"
        data-tooltip="📅 Tasking|Manajemen kerja — Kalender agenda, Scope Aktif (kanban claims), list Warga AI, Mood Radar, Topologi jaringan, dan MCP Browser.||Alt+5">📅
        Tasking</button>
      <button data-tab="workflow"
        data-tooltip="🛤️ Workflow &amp; Governance|Hub gabungan 6 sub-tab: Roadmap & Progress (operasional), Voting (demokrasi warga), Karma (reputasi), Roadmap long-term (planning), Tutorial (panduan menu), Inventory (aset sistem). Klik untuk pilih sub-tab.||Alt+6">🛤️
        Workflow</button>
      <button data-tab="identity"
        data-tooltip="🪪 Identity &amp; Doktrin|Hub gabungan 4 menu warga AI: Prompt Library (template), Doktrin Edukasi (educational errors), Workspace Meta (ruang kerja per-tugas), Death Letters (jejak warga retired). Doktrin Documents dihapus 2026-05-08 (orphan); doktrin sakral sekarang auto-inject via constitution amp>=999998. Klik dulu untuk pilih sub-tab.||Alt+7">🪪
        Identity</button>
      <button data-tab="brain_hub"
        data-tooltip="🧠 Brain &amp; Memory|Hub gabungan 8 sub-tab brain: Memory Palace, Ingatan Kolektif, Mimpi AI (REM), Sovereignty Dashboard, Brain V3 stats, Brain Lobes, Multi-Agent Debate, FQ-Brain Explorer (SQLite). Klik untuk pilih sub-tab.||Alt+9">🧠
        Brain</button>
      <button data-tab="setting"
        data-tooltip="⚙️ Setting|Konfigurasi sistem — Environment variables (.env), integrasi Google OAuth, dan aksi runtime (restart daemon, compact memory, silent mode).||Alt+8">⚙️
        Setting</button>
      <button data-tab="codemap"
        data-tooltip="🗺️ Code Map|Auto-dokumentasi & dependency graph — visualisasi planet antar file, health score per file, impact analysis (jika file X berubah apa yang terdampak), dan re-index trigger.">🗺️
        Code Map</button>
      <button data-tab="mesh"
        data-tooltip="🕸️ Mesh|Daftar komputer (node) yang lagi sync data sama node ini. Hijau = online, merah = ngga kontak. Bisa tambah komputer baru dari form di bawah — ngga perlu SSH atau edit settings DB manual lagi.">🕸️
        Mesh</button>
      <span id="auth-badge" class="auth-badge">— • <a href="#" id="logout-link">logout</a></span>
    </nav>
    <style>
      .auth-badge {
        margin-left: auto;
        font-size: 0.78rem;
        color: var(--text-muted, #94a3b8);
        padding: 4px 10px;
        align-self: center;
      }

      .auth-badge a {
        color: inherit;
        text-decoration: underline;
      }
    </style>
    <script>
      (async () => {
        try {
          const r = await fetch('/api/auth/me');
          if (!r.ok) return;
          const d = await r.json();
          const badge = document.getElementById('auth-badge');
          const icon = d.role === 'owner' ? '👑' : '👥';
          badge.innerHTML = `${icon} ${d.name} (${d.role}) • <a href="#" id="logout-link">logout</a>`;
          document.getElementById('logout-link').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
          });
        } catch (e) { /* ignore */ }
      })();
    </script>
    <main id="main">
      <div class="empty">Loading dashboard modules...</div>
    </main>
  </div>
</body>

</html>
