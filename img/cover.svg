<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04090f"/>
      <stop offset="0.55" stop-color="#071a16"/>
      <stop offset="1" stop-color="#03100c"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eafff5"/>
      <stop offset="0.6" stop-color="#22ff88"/>
      <stop offset="1" stop-color="#19c2ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.34" r="0.5">
      <stop offset="0" stop-color="#22ff88" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22ff88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22ff88" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22ff88" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#1d6f57" fill-opacity="0.18"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- radar motif (right) — nods to the built-in security scanner -->
  <g transform="translate(965,300)" fill="none" stroke="#22ff88">
    <circle r="70"  stroke-opacity="0.20"/>
    <circle r="135" stroke-opacity="0.15"/>
    <circle r="205" stroke-opacity="0.10"/>
    <circle r="275" stroke-opacity="0.06"/>
    <line x1="-275" y1="0" x2="275" y2="0" stroke-opacity="0.10"/>
    <line x1="0" y1="-275" x2="0" y2="275" stroke-opacity="0.10"/>
    <path d="M0 0 L248 -118 A275 275 0 0 1 275 0 Z" fill="url(#sweep)" stroke="none"/>
    <circle cx="150" cy="-92" r="4.5" fill="#22ff88" stroke="none"/>
    <circle cx="-104" cy="70" r="3.5" fill="#19c2ff" stroke="none"/>
    <circle cx="60" cy="170" r="3.5" fill="#22ff88" stroke="none"/>
    <circle cx="210" cy="60" r="3" fill="#7c3aed" stroke="none"/>
  </g>

  <!-- lightning mark -->
  <g transform="translate(96,150)">
    <path d="M44 0 L8 64 L34 64 L18 120 L70 44 L42 44 Z"
          fill="url(#title)" filter="url(#soft)"/>
  </g>

  <!-- kicker -->
  <text x="180" y="150" fill="#22ff88" font-size="22" font-weight="700" letter-spacing="6">SELF-HOSTED · SOVEREIGN · OFFLINE</text>

  <!-- title -->
  <text x="92" y="300" fill="url(#title)" font-size="118" font-weight="800" letter-spacing="-2">Flowork Agent</text>

  <!-- subtitle -->
  <text x="96" y="358" fill="#cfe9df" font-size="34" font-weight="600">The operating system for AI agents you actually own.</text>

  <!-- one-liner -->
  <text x="96" y="404" fill="#7fae9d" font-size="22">A brain that never forgets · a conscience that won't lie · a security radar built in.</text>

  <!-- pillar pills -->
  <g font-size="20" font-weight="600">
    <g transform="translate(96,452)">
      <rect width="250" height="46" rx="23" fill="#0e2a20" stroke="#22ff88" stroke-opacity="0.35"/>
      <circle cx="26" cy="23" r="6" fill="#22ff88"/>
      <text x="44" y="30" fill="#dff7ec">Two-tier brain</text>
    </g>
    <g transform="translate(360,452)">
      <rect width="270" height="46" rx="23" fill="#0e2a20" stroke="#19c2ff" stroke-opacity="0.35"/>
      <circle cx="26" cy="23" r="6" fill="#19c2ff"/>
      <text x="44" y="30" fill="#dff7ec">Security radar built-in</text>
    </g>
    <g transform="translate(644,452)">
      <rect width="250" height="46" rx="23" fill="#0e2a20" stroke="#7c3aed" stroke-opacity="0.45"/>
      <circle cx="26" cy="23" r="6" fill="#7c3aed"/>
      <text x="44" y="30" fill="#dff7ec">Frozen, self-guarding</text>
    </g>
    <g transform="translate(96,512)">
      <rect width="230" height="46" rx="23" fill="#0e2a20" stroke="#22ff88" stroke-opacity="0.35"/>
      <circle cx="26" cy="23" r="6" fill="#22ff88"/>
      <text x="44" y="30" fill="#dff7ec">Voice · multi-channel</text>
    </g>
    <g transform="translate(340,512)">
      <rect width="234" height="46" rx="23" fill="#0e2a20" stroke="#19c2ff" stroke-opacity="0.35"/>
      <circle cx="26" cy="23" r="6" fill="#19c2ff"/>
      <text x="44" y="30" fill="#dff7ec">One pure-Go binary</text>
    </g>
    <g transform="translate(588,512)">
      <rect width="306" height="46" rx="23" fill="#0e2a20" stroke="#22ff88" stroke-opacity="0.35"/>
      <circle cx="26" cy="23" r="6" fill="#22ff88"/>
      <text x="44" y="30" fill="#dff7ec">WASM-sandboxed · MCP client+server</text>
    </g>
  </g>

  <!-- footer -->
  <text x="96" y="600" fill="#5f8a7b" font-size="19" letter-spacing="1">github.com/flowork-os/Flowork_Agent   ·   MIT   ·   No SaaS · No telemetry · No lock-in</text>
</svg>
