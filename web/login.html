<!DOCTYPE html>
<!-- Stable — login text routed through i18n dictionary, no inline copy. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-t="common.auth.title_login">Flowork</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #e2e8f0;
    }
    .login-card {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .login-logo {
      font-size: 2.4rem;
      text-align: center;
      margin-bottom: 6px;
    }
    .login-title {
      font-size: 1.4rem;
      text-align: center;
      font-weight: 600;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-subtitle {
      font-size: 0.85rem;
      text-align: center;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    .login-form { display: flex; flex-direction: column; gap: 14px; }
    .login-form input[type="password"] {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: rgba(15, 23, 42, 0.6);
      color: #e2e8f0;
      font-size: 1rem;
      font-family: monospace;
      transition: border 0.2s;
    }
    .login-form input[type="password"]:focus {
      outline: none;
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }
    .login-form button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .login-form button:hover { transform: translateY(-1px); }
    .login-form button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .login-msg {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }
    .login-msg.error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; display: block; }
    .login-msg.success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; display: block; }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: #64748b;
    }
    .login-hint {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 12px;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🧠</div>
    <h1 class="login-title" data-t="common.auth.title_login">Flowork</h1>
    <p class="login-subtitle" data-t="common.auth.subtitle_login">Welcome back.</p>

    <form id="login-form" class="login-form">
      <input
        type="password"
        id="password"
        name="password"
        data-t-placeholder="common.placeholder.password"
        autocomplete="current-password"
        required
        autofocus
      />
      <button type="submit" id="submit-btn" data-t="common.btn.sign_in">Sign In</button>
    </form>

    <div id="msg" class="login-msg"></div>

    <p class="login-hint" data-t="common.auth.hint_owner"></p>
    <p style="text-align:center;margin-top:18px;font-size:0.85rem;">
      <span data-t="common.auth.no_account"></span>
      <a href="/register" data-t="common.auth.register_here" style="color:#a78bfa;text-decoration:underline;"></a>
    </p>
    <p class="login-footer" data-t="common.auth.footer"></p>
  </div>

  <script type="module">
    import { loadI18n, applyI18n, t } from '/js/i18n.js?v=10';
    await loadI18n('en');
    applyI18n();
    // applyI18n only handles data-t / data-tooltip-key / data-t-title. Wire
    // the placeholder attribute manually here so the password input picks up
    // the dictionary value too.
    document.querySelectorAll('[data-t-placeholder]').forEach((el) => {
      el.setAttribute('placeholder', t(el.getAttribute('data-t-placeholder')));
    });

    const form = document.getElementById('login-form');
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('msg');
    const signInLabel = t('common.btn.sign_in');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      btn.disabled = true;
      btn.textContent = t('common.btn.verifying');
      msg.className = 'login-msg';
      msg.textContent = '';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const d = await r.json();
        if (!r.ok) {
          msg.className = 'login-msg error';
          msg.textContent = d.error || `HTTP ${r.status}`;
          btn.disabled = false;
          btn.textContent = signInLabel;
          return;
        }
        msg.className = 'login-msg success';
        msg.textContent = `✅ ${t('common.auth.welcome_msg')}, ${d.name} (${d.role})`;
        setTimeout(() => {
          const dest = new URLSearchParams(window.location.search).get('next') || '/';
          window.location.href = dest;
        }, 600);
      } catch (err) {
        msg.className = 'login-msg error';
        msg.textContent = t('error.NETWORK_FAIL');
        btn.disabled = false;
        btn.textContent = signInLabel;
      }
    });
  </script>
</body>
</html>
